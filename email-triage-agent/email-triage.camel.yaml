- route:
    id: read-emails
    from:
      uri: imaps
      parameters:
        delete: "false"
        host: //imap.gmail.com
        unseen: "true"
      steps:
        - log:
            message: "New email from ${header.From} — Subject: ${header.Subject}"
        - to:
            uri: direct:summarize
- route:
    id: summarize-email
    from:
      uri: direct:summarize
      steps:
        - setBody:
            simple: "Summarize the following email in 2-3 sentences. Include the key action items if any.\n\nFrom: ${header.From}\nSubject: ${header.Subject}\n\nEmail body:\n${body}"
        - to:
            uri: langchain4j-agent:agent
            parameters:
              agent: "#ollama"
        - log:
            message: "--- Summary for [${header.Subject}] from ${header.From} ---\n${body}"