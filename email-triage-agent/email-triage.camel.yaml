- route:
    id: read-emails
    from:
      uri: imaps
      parameters:
        delete: "false"
        host: //imap.gmail.com
        unseen: "true"
        username: "{{env:MAIL_USERNAME}}"
        password: "{{env:MAIL_PASSWD}}"
      steps:
        - log:
            message: "Subject: ${header.Subject}"
        - log:
            message: "From: ${header.From}"
        - log:
            message: "Body: ${body}"
