- route:
    id: read-emails
    from:
      uri: imaps
      parameters:
        delete: "false"
        host: //imap.gmail.com
        unseen: "true"
      steps:
        - setBody:
            simple: "Summarize the following email in 2-3 sentences. Include the key action items if any. \nFrom: ${header.From}\nSubject: ${header.Subject}\n\nEmail body:\n${body}"
        - to:
            id: to-3384
            uri: langchain4j-agent:agent
            parameters:
              agent: '#ollama'
        - log:
            id: log-4263
            message: ${body}