- route:
    id: triage-email-main-agent
    from:
      uri: google-mail-stream:0
      parameters:
        applicationName: camel-email-triage
        delay: "10000"
        markAsRead: "false"
        query: is:unread in:inbox
      steps:
        - setVariable:
            description: Clean email body - strip HTML tags and decode entities
            name: cleanedEmailBody
            simple:
              expression: ${body} ~> ${htmlDecode()}
              trimResult: true
        - setVariable:
            description: Clean email subject - decode HTML entities
            name: cleanedSubject
            simple:
              expression: ${header.CamelGoogleMailStreamSubject} ~> ${htmlDecode()}
              trimResult: true
        - setBody:
            id: prompt
            description: Triage prompt
            simple: >-
              Classify the following email.

              From: ${header.CamelGoogleMailStreamFrom}

              Subject: ${variable.cleanedSubject}

              Body:

              ---

              ${variable.cleanedEmailBody}

              ---
        - to:
            description: The triage agent
            uri: openai:chat-completion
            parameters:
              jsonSchema: "resource:classpath:email-triage-result.schema.json"
        - log:
            message: Triaged [${variable.cleanedSubject}]
        - setVariable:
            description: Set triage category
            jsonpath:
              expression: $.category
            name: triageCategory
        - setVariable:
            description: Set needsReply flag
            jsonpath:
              expression: $.needsReply
            name: triageNeedsReply
        - choice:
            description: Handle known categories
            otherwise:
              steps: []
            when:
              - description: Valid category
                steps:
                  - to:
                      description: Triage
                      uri: direct:handle-triaged-email
                  - choice:
                      description: Draft reply if needed
                      when:
                        - description: Real sender
                          steps:
                            - wireTap:
                                description: Draft reply
                                uri: direct:draft-reply
                          simple:
                            expression: ${variable.triageNeedsReply} == true &&
                              ${header.CamelGoogleMailStreamFrom} !regex
                              '(?i).*(noreply|no-reply|no_reply|donotreply|do-not-reply|do_not_reply|mailer-daemon|notifications|notify|alert|atlassian|jira|github|gitlab|bitbucket|confluence).*'
                simple:
                  expression: ${variable.triageCategory} in
                    'URGENT,ACTION_REQUIRED,INFORMATIONAL,SECURITY_ALERT,PURCHASE,SHIPPING'
- route:
    id: handle-triaged-email
    description: Handles a successfully triaged email based on its category
    from:
      uri: direct:handle-triaged-email
      steps:
        - setVariable:
            description: Add category label
            name: addLabels
            simple: ${variable.triageCategory}
        - setVariable:
            description: Remove INBOX label
            name: removeLabels
            constant: INBOX
        - log:
            message: Moving [${variable.cleanedSubject}] to label ${variable.triageCategory}
        - transformDataType:
            toType: google-mail:update-message-labels
        - to:
            description: Update Gmail labels
            uri: google-mail:messages/modify
            parameters:
              inBody: modifyMessageRequest
              applicationName: camel-email-triage
              userId: me
- route:
    id: draft-reply
    description: Generate and save a draft reply
    from:
      uri: direct:draft-reply
      steps:
        - setBody:
            description: Reply prompt
            simple: >-
              Draft a short, professional email reply (under 100 words). Output
              ONLY the reply body text, no subject, no metadata, no markdown.

              Do NOT fabricate information. If you cannot answer, say you will
              follow up.


              From: ${header.CamelGoogleMailStreamFrom}

              Subject: ${variable.cleanedSubject}

              Body: ${variable.cleanedEmailBody}
        - to:
            description: LLM reply
            uri: openai:chat-completion
        - log:
            message: Drafting reply for [${variable.cleanedSubject}]
        - transformDataType:
            toType: google-mail:draft
        - to:
            description: Save draft
            uri: google-mail:drafts/create
            parameters:
              inBody: content
              applicationName: camel-email-triage
              userId: me
