# Dependencies
camel.jbang.dependencies=mvn:org.jsoup:jsoup:1.22.1

# LLM configuration (Gemma 4 via Ollama)
camel.component.openai.model=gemma4:e4b
camel.component.openai.baseUrl=http://localhost:11434/v1
camel.component.openai.apiKey=ollama

# Google Mail configuration
camel.component.google-mail-stream.clientId=<YOUR_CLIENT_ID>
camel.component.google-mail-stream.clientSecret=<YOUR_CLIENT_SECRET>
camel.component.google-mail-stream.refreshToken=<YOUR_REFRESH_TOKEN>
camel.component.google-mail.clientId=<YOUR_CLIENT_ID>
camel.component.google-mail.clientSecret=<YOUR_CLIENT_SECRET>
camel.component.google-mail.refreshToken=<YOUR_REFRESH_TOKEN>
